name: Release TestFlight
run-name: release ios ${{ inputs.versionName || github.ref_name }}

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      versionName:
        description: "Override MARKETING_VERSION (optional, e.g. 1.0.1)"
        required: false

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: yarn

      - name: Enable corepack
        run: corepack enable

      - name: Install JS dependencies
        run: yarn install --immutable

      - name: Install Ruby gems
        run: bundle install

      - name: Install CocoaPods
        working-directory: ios
        run: bundle exec pod install

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION_NAME: ${{ inputs.versionName }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          VN="$INPUT_VERSION_NAME"
          if [ -z "$VN" ] && [ "$REF_TYPE" = "tag" ]; then
            VN="${REF_NAME#v}"
          fi
          echo "marketing_version=$VN" >> "$GITHUB_OUTPUT"
          echo "Resolved MARKETING_VERSION='$VN'"

      - name: Decode signing assets
        env:
          DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/signing"
          echo "$DIST_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/signing/dist.p12"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$RUNNER_TEMP/signing/profile.mobileprovision"

      - name: Build and upload to TestFlight
        working-directory: ios
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
          DIST_CERT_PATH: ${{ runner.temp }}/signing/dist.p12
          DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          PROVISIONING_PROFILE_PATH: ${{ runner.temp }}/signing/profile.mobileprovision
          BUILD_NUMBER: ${{ github.run_number }}
          MARKETING_VERSION: ${{ steps.version.outputs.marketing_version }}
        run: bundle exec fastlane ios beta

      - name: Cleanup signing assets
        if: always()
        run: rm -rf "$RUNNER_TEMP/signing"
