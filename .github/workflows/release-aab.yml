name: Build Release AAB
run-name: release android ${{ inputs.versionName || github.ref_name }}

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      versionCode:
        description: "Override versionCode (optional)"
        required: false
      versionName:
        description: "Override versionName (optional)"
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: yarn

      - name: Enable corepack
        run: corepack enable

      - name: Install JS dependencies
        run: yarn install --immutable

      - name: Decode upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload.keystore
          ls -la android/app/upload.keystore

      - name: Set versionCode / versionName
        env:
          INPUT_VERSION_CODE: ${{ inputs.versionCode }}
          INPUT_VERSION_NAME: ${{ inputs.versionName }}
          RUN_NUMBER: ${{ github.run_number }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          VN="$INPUT_VERSION_NAME"
          if [ -z "$VN" ] && [ "$REF_TYPE" = "tag" ]; then
            VN="${REF_NAME#v}"
          fi
          VC="${INPUT_VERSION_CODE:-$RUN_NUMBER}"
          sed -i "s/versionCode [0-9]\+/versionCode $VC/" android/app/build.gradle
          if [ -n "$VN" ]; then
            sed -i "s/versionName \"[^\"]*\"/versionName \"$VN\"/" android/app/build.gradle
            cat > src/app-version.ts <<EOF
          // Generated at build time from the release tag.
          export const APP_VERSION = '$VN'
          EOF
          fi
          grep -E "versionCode|versionName" android/app/build.gradle
          cat src/app-version.ts

      - name: Build release AAB
        working-directory: android
        env:
          UPLOAD_KEYSTORE_FILE: ${{ github.workspace }}/android/app/upload.keystore
          UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
          UPLOAD_KEY_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
          UPLOAD_KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: bat-mobile-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14

      - name: Check Play credentials
        id: play_creds
        env:
          PLAY_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$PLAY_JSON" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "PLAY_SERVICE_ACCOUNT_JSON not set; skipping Play upload."
          fi

      - name: Upload to Google Play
        if: steps.play_creds.outputs.enabled == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.tonyq.betteragentterminal
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          tracks: internal,beta
          status: completed

      - name: Cleanup keystore
        if: always()
        run: rm -f android/app/upload.keystore
