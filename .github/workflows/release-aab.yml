name: Build Release AAB

on:
  workflow_dispatch:
    inputs:
      versionCode:
        description: "Override versionCode (optional)"
        required: false
      versionName:
        description: "Override versionName (optional)"
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn

      - name: Enable corepack
        run: corepack enable

      - name: Install JS dependencies
        run: yarn install --immutable

      - name: Decode upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload.keystore
          ls -la android/app/upload.keystore

      - name: Set versionCode / versionName
        env:
          INPUT_VERSION_CODE: ${{ inputs.versionCode }}
          INPUT_VERSION_NAME: ${{ inputs.versionName }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          VC="${INPUT_VERSION_CODE:-$RUN_NUMBER}"
          sed -i "s/versionCode [0-9]\+/versionCode $VC/" android/app/build.gradle
          if [ -n "$INPUT_VERSION_NAME" ]; then
            sed -i "s/versionName \"[^\"]*\"/versionName \"$INPUT_VERSION_NAME\"/" android/app/build.gradle
          fi
          grep -E "versionCode|versionName" android/app/build.gradle

      - name: Build release AAB
        working-directory: android
        env:
          UPLOAD_KEYSTORE_FILE: ${{ github.workspace }}/android/app/upload.keystore
          UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
          UPLOAD_KEY_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
          UPLOAD_KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: bat-mobile-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14

      - name: Cleanup keystore
        if: always()
        run: rm -f android/app/upload.keystore
